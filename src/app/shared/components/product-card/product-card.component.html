<div class="group cursor-pointer">
  <a [routerLink]="['/product', product.id]" class="block">
    <!-- Image Container -->
    <div class="relative aspect-[3/4] overflow-hidden bg-maison-greige">
      <img
        [src]="product.image"
        [alt]="product.name"
        class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105"
      />

      <!-- Badges -->
      <ng-container *ngIf="showBadges">
        <span
          *ngIf="product.isNew"
          class="absolute top-0 left-0 bg-black text-white label-caps text-[9px] px-3 py-1.5"
        >
          New
        </span>
        <span
          *ngIf="product.isSale"
          class="absolute top-0 left-0 bg-maison-gold text-white label-caps text-[9px] px-3 py-1.5"
          [class.mt-8]="product.isNew"
        >
          Sale
        </span>
      </ng-container>

      <!-- Hover Quick Actions -->
      <div class="absolute bottom-0 left-0 w-full p-4 translate-y-full group-hover:translate-y-0 transition-transform duration-500 bg-white/10 backdrop-blur-sm flex gap-2">
        <button
          (click)="onAddToCart($event)"
          class="flex-grow py-3 label-caps text-[9px] transition-all duration-300"
          [ngClass]="addedToCart ? 'bg-maison-gold text-white' : 'bg-black text-white hover:bg-black/80'"
        >
          {{ addedToCart ? 'Ajouté ✓' : 'Add to Cart' }}
        </button>
        <button
          (click)="onToggleWishlist($event)"
          class="bg-white text-black p-3 hover:bg-maison-greige"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2"
              d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Info Section -->
    <div class="mt-6 space-y-2">
      <div class="flex justify-between items-start gap-4">
        <h4 class="text-[13px] font-sans uppercase tracking-[0.1em] leading-tight flex-grow">
          {{ product.name }}
        </h4>
        <p class="text-[13px] font-semibold">
          {{ formatPrice(product.price) }}
        </p>
      </div>
      <p class="label-caps text-[10px] text-gray-400">
        {{ product.category }}
      </p>
    </div>
  </a>
</div>
