<div class="space-y-12 pb-16">
  <!-- Hero Section: Premium Lookbook Style -->
  <section class="relative h-[75vh] w-full overflow-hidden bg-maison-greige">
    <video autoplay loop muted playsinline
      poster="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?auto=format&fit=crop&q=80&w=2000"
      class="absolute inset-0 w-full h-full object-cover opacity-80 scale-105 contrast-125 brightness-90"
      src="https://videos.pexels.com/video-files/3744654/3744654-uhd_2560_1440_30fps.mp4">
    </video>

    <!-- Film Grain Overlay -->
    <div class="absolute inset-0 opacity-[0.03] pointer-events-none mix-blend-overlay"
      style="background-image: url('https://grainy-gradients.vercel.app/noise.svg');"></div>

    <!-- Hero Overlay Content -->
    <div
      class="absolute inset-0 bg-black/20 flex flex-col items-center justify-center text-center p-6 backdrop-brightness-95">
      <div class="max-w-4xl mx-auto space-y-6 animate-in fade-in slide-in-from-bottom-10 duration-1000">
        <span class="label-caps text-white tracking-[0.5em] block text-[9px]">
          Nouvelle Saison 2024
        </span>

        <h1 class="text-white text-5xl md:text-[80px] font-serif mb-4 tracking-[-0.04em] leading-[0.9] uppercase">
          L'Essence du<br />Minimalisme
        </h1>

        <p
          class="text-white/90 text-xs md:text-sm max-w-lg mx-auto font-sans tracking-widest uppercase italic font-light">
          La quintessence du luxe intemporel par Maison Shein.
        </p>

        <div class="flex flex-col sm:flex-row items-center justify-center gap-4 pt-6">
          <button (click)="goShop()"
            class="btn bg-white text-black border-none px-8 py-3 h-auto label-caps text-[9px] hover:bg-black hover:text-white transition-all duration-500 min-w-[160px]">
            Découvrir
          </button>
          <button
            class="btn bg-transparent border border-white text-white px-8 py-3 h-auto label-caps text-[9px] hover:bg-white hover:text-black transition-all duration-500 min-w-[160px]">
            Lookbook
          </button>
        </div>
      </div>
    </div>

    <!-- Floating Scroll Indicator -->
    <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex flex-col items-center space-y-2">
      <div class="w-[1px] h-6 bg-white/40 overflow-hidden">
        <div class="w-full h-full bg-white origin-top animate-scroll-line"></div>
      </div>
    </div>
  </section>

  <!-- Featured Collections Section -->
  <section class="max-w-[1800px] mx-auto px-6 md:px-12 reveal-on-scroll">
    <div class="flex flex-col md:flex-row md:items-end justify-between mb-8 gap-4">
      <div class="space-y-2">
        <span class="label-caps text-[9px] text-gray-400">Curated Selection</span>
        <h2 class="h2-editorial text-3xl uppercase">Nos Incontournables</h2>
      </div>
      <button (click)="goShop()"
        class="label-caps text-[9px] border-b border-black pb-1 hover:opacity-50 transition-opacity">
        Voir toute la collection
      </button>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
      <app-product-card *ngFor="let product of featuredProducts; let i = index" [product]="product"
        (addToCart)="onAddToCart($event)" (toggleWishlist)="onToggleWishlist($event)"></app-product-card>
    </div>
  </section>

  <!-- Split Banner Section -->
  <section
    class="grid grid-cols-1 md:grid-cols-2 h-[50vh] bg-maison-greige overflow-hidden reveal-on-scroll reveal-delay-2">
    <div class="relative group cursor-pointer overflow-hidden">
      <img src="https://images.unsplash.com/photo-1539109136881-3be0616acf4b?auto=format&fit=crop&q=80&w=1000"
        class="absolute inset-0 w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700 scale-105 group-hover:scale-100"
        alt="Men's collection">
      <div class="absolute inset-0 bg-black/20 group-hover:bg-black/10 transition-colors"></div>
      <div class="absolute inset-0 flex flex-col items-center justify-center text-white">
        <h2 class="text-3xl font-serif mb-3 uppercase tracking-tight">Pour Lui</h2>
        <button
          class="label-caps border border-white px-5 py-2 text-[8px] hover:bg-white hover:text-black transition-all">Explorer</button>
      </div>
    </div>
    <div class="relative group cursor-pointer overflow-hidden">
      <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?auto=format&fit=crop&q=80&w=1000"
        class="absolute inset-0 w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700 scale-105 group-hover:scale-100"
        alt="Women's collection">
      <div class="absolute inset-0 bg-black/20 group-hover:bg-black/10 transition-colors"></div>
      <div class="absolute inset-0 flex flex-col items-center justify-center text-white">
        <h2 class="text-3xl font-serif mb-3 uppercase tracking-tight">Pour Elle</h2>
        <button
          class="label-caps border border-white px-5 py-2 text-[8px] hover:bg-white hover:text-black transition-all">Explorer</button>
      </div>
    </div>
  </section>

  <!-- Promotions Section -->
  <section class="py-12 reveal-on-scroll">
    <div class="max-w-[1800px] mx-auto px-6 md:px-12">
      <div class="text-center mb-10 space-y-2">
        <span class="label-caps text-[9px] text-maison-gold">Archive Sale</span>
        <h2 class="h2-editorial text-3xl uppercase">Offres Spéciales</h2>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        <app-product-card *ngFor="let product of specialOffers" [product]="product" [compact]="true"
          (addToCart)="onAddToCart($event)" (toggleWishlist)="onToggleWishlist($event)"></app-product-card>
      </div>
    </div>
  </section>

  <!-- Newsletter / Brand Story -->
  <section class="max-w-2xl mx-auto px-6 text-center space-y-8 pb-12 reveal-on-scroll">
    <div class="space-y-3">
      <h2 class="text-2xl font-serif tracking-tight uppercase">Rejoignez l'Univers</h2>
      <p class="text-gray-500 font-light text-xs max-w-sm mx-auto">
        Inscrivez-vous pour recevoir nos lookbooks exclusifs et nos nouveautés.
      </p>
    </div>

    <div class="flex flex-col sm:flex-row gap-3 max-w-sm mx-auto">
      <input type="email" placeholder="VOTRE EMAIL"
        class="input-premium flex-grow py-2 text-[9px] tracking-widest uppercase">
      <button class="bg-black text-white px-6 py-2 label-caps text-[8px] hover:bg-black/80">S'inscrire</button>
    </div>
  </section>
</div>
