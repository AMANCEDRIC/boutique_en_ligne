<div class="hidden md:flex md:flex-col md:h-screen w-64 bg-black text-white p-10 fixed left-0 top-0 border-r border-white/10">
  <div class="mb-16">
    <h2 class="text-xl font-serif tracking-[-0.05em] uppercase">
      Maison Shein
    </h2>
    <p class="label-caps text-[8px] text-gray-500 mt-2 tracking-[0.4em]">Administration</p>
  </div>

  <nav class="space-y-6 flex-grow">
    <div class="space-y-2">
      <h4 class="label-caps text-[9px] text-gray-500 mb-4 px-2">Navigation</h4>
      <button
        (click)="setTab('stats')"
        class="w-full text-left py-3 px-4 label-caps text-[10px] transition-all relative group"
        [ngClass]="activeTab === 'stats' ? 'text-white bg-white/5' : 'text-gray-400 hover:text-white'"
      >
        Tableau de Bord
        <span *ngIf="activeTab === 'stats'" class="absolute left-0 top-0 w-1 h-full bg-maison-gold"></span>
      </button>

      <button
        (click)="setTab('products')"
        class="w-full text-left py-3 px-4 label-caps text-[10px] transition-all relative group"
        [ngClass]="activeTab === 'products' ? 'text-white bg-white/5' : 'text-gray-400 hover:text-white'"
      >
        Gestion Articles
        <span *ngIf="activeTab === 'products'" class="absolute left-0 top-0 w-1 h-full bg-maison-gold"></span>
      </button>

      <button
        (click)="setTab('orders')"
        class="w-full text-left py-3 px-4 label-caps text-[10px] transition-all relative group"
        [ngClass]="activeTab === 'orders' ? 'text-white bg-white/5' : 'text-gray-400 hover:text-white'"
      >
        Commandes
        <span *ngIf="activeTab === 'orders'" class="absolute left-0 top-0 w-1 h-full bg-maison-gold"></span>
      </button>
    </div>
  </nav>

  <div class="pt-10 border-t border-white/10">
    <a
      routerLink="/"
      class="w-full text-left py-3 px-4 label-caps text-[9px] text-gray-500 hover:text-white flex items-center gap-3 transition-colors"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
      <span>Retour Boutique</span>
    </a>
  </div>
</div>
