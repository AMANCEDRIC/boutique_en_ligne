<div
  *ngIf="config"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm transition-opacity"
  (click)="cancel()"
>
  <div
    class="bg-white rounded-2xl shadow-2xl max-w-md w-full mx-4 transform transition-all"
    (click)="$event.stopPropagation()"
  >
    <!-- Header -->
    <div class="px-8 pt-8 pb-4 border-b border-gray-100">
      <div class="flex items-center space-x-4">
        <span [ngClass]="getIconClass()" class="text-3xl font-bold">
          {{ getIcon() }}
        </span>
        <h3 class="text-xl font-serif uppercase tracking-tight">
          {{ config.title || 'Notification' }}
        </h3>
      </div>
    </div>

    <!-- Body -->
    <div class="px-8 py-6">
      <p class="text-gray-600 leading-relaxed font-light">
        {{ config.message }}
      </p>
    </div>

    <!-- Footer -->
    <div class="px-8 pb-8 pt-4 flex justify-end space-x-4">
      <button
        *ngIf="config.showCancel"
        (click)="cancel()"
        class="px-6 py-3 text-[10px] font-bold uppercase tracking-widest border border-gray-200 text-gray-400 hover:border-black hover:text-black transition-colors rounded-lg"
      >
        {{ config.cancelText || 'Annuler' }}
      </button>
      <button
        (click)="confirm()"
        class="px-6 py-3 text-[10px] font-bold uppercase tracking-widest bg-black text-white hover:bg-gray-800 transition-colors rounded-lg"
        [ngClass]="{
          'bg-red-500 hover:bg-red-600': config.type === 'error',
          'bg-yellow-500 hover:bg-yellow-600': config.type === 'warning',
          'bg-green-500 hover:bg-green-600': config.type === 'success'
        }"
      >
        {{ config.confirmText || 'OK' }}
      </button>
    </div>
  </div>
</div>
