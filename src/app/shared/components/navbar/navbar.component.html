<nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-maison-light-gray transition-all duration-300">
  <div class="max-w-[1800px] mx-auto px-6 py-4 flex items-center justify-between">
    <!-- Logo -->
    <div class="cursor-pointer flex-shrink-0" (click)="goHome()">
      <h1 class="text-xl md:text-3xl font-serif tracking-[-0.05em] hover:opacity-70 transition-opacity uppercase">
        Maison Shein
      </h1>
    </div>

    <!-- Navigation centrale -->
    <div class="hidden lg:flex items-center space-x-10">
      <button
        (click)="goShop('all')"
        class="label-caps hover:text-black transition-colors py-2 relative group"
        [ngClass]="navFilter === 'all' ? 'text-black' : 'text-gray-400'"
      >
        Collection
        <span class="absolute bottom-0 left-0 w-full h-0.5 bg-black transform transition-transform duration-300" 
              [ngClass]="navFilter === 'all' ? 'scale-x-100' : 'scale-x-0 group-hover:scale-x-100'"></span>
      </button>
      <button
        (click)="goShop('new')"
        class="label-caps hover:text-black transition-colors py-2 relative group"
        [ngClass]="navFilter === 'new' ? 'text-black' : 'text-gray-400'"
      >
        Nouveautés
        <span class="absolute bottom-0 left-0 w-full h-0.5 bg-black transform transition-transform duration-300" 
              [ngClass]="navFilter === 'new' ? 'scale-x-100' : 'scale-x-0 group-hover:scale-x-100'"></span>
      </button>
      <button
        (click)="goShop('sale')"
        class="label-caps transition-colors py-2 relative group"
        [ngClass]="navFilter === 'sale' ? 'text-red-600' : 'text-red-500 hover:text-red-400'"
      >
        Promotions
        <span class="absolute bottom-0 left-0 w-full h-0.5 bg-red-600 transform transition-transform duration-300" 
              [ngClass]="navFilter === 'sale' ? 'scale-x-100' : 'scale-x-0 group-hover:scale-x-100'"></span>
      </button>
    </div>

    <!-- Actions droites -->
    <div class="flex items-center space-x-6">
      <button
        (click)="goAdmin()"
        class="hidden sm:block label-caps text-[10px] text-gray-400 hover:text-black border border-maison-light-gray px-4 py-1.5 transition-all"
      >
        Admin
      </button>

      <div class="flex items-center space-x-4">
        <button class="p-1 text-black hover:scale-110 transition-transform hidden md:block">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </button>

        <button (click)="goWishlist()" class="relative p-1 text-black hover:scale-110 transition-transform">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2"
              d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
          </svg>
          <span *ngIf="wishlistCount > 0"
                class="absolute -top-1 -right-1 bg-maison-gold text-white text-[8px] w-3.5 h-3.5 flex items-center justify-center font-bold">
            {{ wishlistCount }}
          </span>
        </button>

        <button (click)="goCart()" class="relative p-1 text-black hover:scale-110 transition-transform">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2"
              d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
          </svg>
          <span *ngIf="cartCount > 0"
                class="absolute -top-1 -right-1 bg-black text-white text-[8px] w-3.5 h-3.5 flex items-center justify-center font-bold">
            {{ cartCount }}
          </span>
        </button>
      </div>
    </div>
  </div>
</nav>
